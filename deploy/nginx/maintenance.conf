# MAINTENANCE_MODE — nginx leve durante deploy (VM 1 GB)
server {
    listen 80;
    server_name financeiro.seumovimento.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name financeiro.seumovimento.com.br;

    ssl_certificate     /etc/nginx/ssl/gestao-financeira.crt;
    ssl_certificate_key /etc/nginx/ssl/gestao-financeira.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/maintenance;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        try_files /index.html =503;
        add_header Retry-After 120 always;
        add_header Cache-Control "no-store" always;
    }
}
