name: Deploy Native

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Validate deploy secrets
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          [ -n "$SSH_HOST" ] || { echo "::error::Secret SSH_HOST não configurado"; missing=1; }
          [ -n "$SSH_USER" ] || { echo "::error::Secret SSH_USER não configurado"; missing=1; }
          [ -n "$SSH_KEY" ] || { echo "::error::Secret SSH_PRIVATE_KEY não configurado ou vazio"; missing=1; }
          exit "$missing"

      - name: Build release
        run: |
          npm ci
          npm run build --workspace backend
          npm run build --workspace frontend
          tar -czf release.tar.gz \
            package.json package-lock.json \
            backend/package.json backend/dist \
            frontend/package.json frontend/dist \
            UI/package.json \
            deploy/install-native.sh \
            deploy/env.native.example \
            deploy/mongodb/mongod.conf \
            deploy/nginx/native.conf \
            deploy/systemd/gestao-financeira-backend.service

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Test SSH connection (fail fast)
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" "echo OK"

      - name: Upload release to VM
        run: |
          PORT="${SSH_PORT:-22}"
          scp -P "$PORT" \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=accept-new \
            release.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/"

      - name: Install on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 45m
          envs: SEED_ADMIN_PASSWORD
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="${APP_DIR:-/opt/gestao-financeira}"
            sudo mkdir -p "$APP_DIR"
            sudo chown opc:opc "$APP_DIR"
            cd "$APP_DIR"
            tar -xzf /tmp/release.tar.gz
            chmod +x deploy/install-native.sh
            export SEED_ADMIN_PASSWORD="${{ secrets.SEED_ADMIN_PASSWORD }}"
            bash deploy/install-native.sh
            rm -f /tmp/release.tar.gz
