name: Deploy Native

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build release artifacts
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for E2E
        run: npm run build

      - name: Install Playwright
        run: npm run e2e:install

      - name: Run E2E + A11y
        run: npm run e2e

  deploy:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate deploy secrets
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          [ -n "$SSH_HOST" ] || { echo "::error::Secret SSH_HOST não configurado"; missing=1; }
          [ -n "$SSH_USER" ] || { echo "::error::Secret SSH_USER não configurado"; missing=1; }
          [ -n "$SSH_KEY" ] || { echo "::error::Secret SSH_PRIVATE_KEY não configurado ou vazio"; missing=1; }
          exit "$missing"

      - name: Build release
        run: |
          npm ci
          npm run build --workspace backend
          npm run build --workspace frontend
          tar -czf release.tar.gz \
            package.json package-lock.json \
            backend/package.json backend/dist \
            frontend/package.json frontend/dist \
            deploy/install-native.sh \
            deploy/maintenance.sh \
            deploy/backup-mongo.sh \
            deploy/setup-backup-cron.sh \
            deploy/ssl/generate-selfsigned.sh \
            deploy/ssl/install-letsencrypt.sh \
            deploy/env.native.example \
            deploy/mongodb/mongod.conf \
            deploy/nginx/native.conf \
            deploy/nginx/maintenance.conf \
            deploy/nginx/maintenance.html \
            deploy/systemd/gestao-financeira-backend.service \
            deploy/systemd/mongod.service

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM (upload + install, conexão única)
        timeout-minutes: 50
        run: |
          PORT="${SSH_PORT:-22}"
          [ -n "$PORT" ] || PORT=22
          if [ ! -f release.tar.gz ]; then
            echo "::error::release.tar.gz não encontrado após o build"
            exit 1
          fi
          ls -lh release.tar.gz
          SSH_BASE=(
            -p "$PORT"
            -o BatchMode=yes
            -o ConnectTimeout=120
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=10
            -o StrictHostKeyChecking=accept-new
            -o TCPKeepAlive=yes
          )
          for attempt in 1 2 3 4 5; do
            echo "==> Deploy tentativa $attempt/5"
            CONTROL="$RUNNER_TEMP/ssh-deploy-${attempt}-%C"
            SSH_M=("${SSH_BASE[@]}" -o ControlMaster=auto -o ControlPath="$CONTROL" -o ControlPersist=120)
            cleanup() {
              ssh "${SSH_M[@]}" -O exit "${SSH_USER}@${SSH_HOST}" 2>/dev/null || true
            }
            trap cleanup EXIT
            if ! ssh "${SSH_M[@]}" "${SSH_USER}@${SSH_HOST}" "echo connected"; then
              cleanup
              trap - EXIT
              wait=$((attempt * 20))
              echo "Conexão falhou; aguardando ${wait}s..."
              sleep "$wait"
              continue
            fi
            if ! cat release.tar.gz | ssh "${SSH_M[@]}" "${SSH_USER}@${SSH_HOST}" "cat > /tmp/release.tar.gz && ls -lh /tmp/release.tar.gz"; then
              cleanup
              trap - EXIT
              wait=$((attempt * 20))
              echo "Upload falhou; aguardando ${wait}s..."
              sleep "$wait"
              continue
            fi
            if ssh "${SSH_M[@]}" "${SSH_USER}@${SSH_HOST}" \
              "export SEED_ADMIN_PASSWORD=$(printf '%q' "${SEED_ADMIN_PASSWORD:-}") APP_DIR=$(printf '%q' "${DEPLOY_PATH:-/opt/gestao-financeira}")" \
              bash -s < deploy/ci-remote-deploy.sh; then
              cleanup
              trap - EXIT
              exit 0
            fi
            cleanup
            trap - EXIT
            wait=$((attempt * 20))
            echo "Instalação falhou; aguardando ${wait}s..."
            sleep "$wait"
          done
          echo "::error::Deploy falhou após 5 tentativas"
          exit 1
